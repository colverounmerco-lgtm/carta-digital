<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña — Carta Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon" style="font-size:1.6rem">🔐</div>
      <h1>Nueva contraseña</h1>
      <p>Ingresa el código enviado a<br><strong>{{ email }}</strong></p>
    </div>

    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="alerta alerta-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/recuperar/codigo">
      <div class="campo">
        <label>Código de verificación</label>
        <input type="text" name="codigo" inputmode="numeric" maxlength="6"
               placeholder="000000" required autofocus
               style="font-size:1.8rem;font-weight:800;letter-spacing:0.5rem;text-align:center">
      </div>
      <div class="campo">
        <label>Nueva contraseña</label>
        <input type="password" name="password" placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>
      <div class="campo">
        <label>Repetir nueva contraseña</label>
        <input type="password" name="password2" placeholder="••••••••" required minlength="6">
      </div>
      <button type="submit" class="btn-primario"
              style="width:100%;padding:0.8rem;font-size:0.95rem;justify-content:center">
        Cambiar contraseña
      </button>
    </form>

    <div style="text-align:center;margin-top:1.25rem">
      <p style="font-size:0.83rem;color:#9CA3AF;margin-bottom:0.6rem">¿No recibiste el código?</p>
      <a href="/recuperar" style="color:#F97316;font-weight:700;font-size:0.88rem">Volver a enviar</a>
    </div>

    <p class="auth-footer"><a href="/login">← Volver al inicio de sesión</a></p>
  </div>
</div>
</body>
</html>
