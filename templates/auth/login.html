<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Carta Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/static/img/logo.svg">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="/static/img/logo.svg" style="width:64px;height:64px;border-radius:14px;margin:0 auto 0.75rem;display:block">
      <h1>Carta Digital</h1>
      <p>Ingresa a tu panel de restaurante</p>
    </div>

    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="alerta alerta-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/login">
      <div class="campo">
        <label>Correo electrónico</label>
        <input type="email" name="email" placeholder="tu@restaurante.com" required autofocus>
      </div>
      <div class="campo">
        <label>Contraseña</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primario" style="width:100%;padding:0.75rem;font-size:0.95rem;justify-content:center">
        Entrar
      </button>
    </form>

    <p class="auth-footer" style="margin-bottom:0.5rem">
      <a href="/recuperar" style="color:#9CA3AF;font-size:0.83rem">¿Olvidaste tu contraseña?</a>
    </p>
    <p class="auth-footer">¿No tienes cuenta? <a href="/register">Registrar restaurante</a></p>
  </div>
</div>
</body>
</html>
