<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ restaurante.nombre }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #F9FAFB; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: #fff; border-radius: 20px; padding: 2.5rem 2rem;
            max-width: 400px; width: 100%; text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  </style>
</head>
<body>
  <div class="card">
    {% if restaurante.logo_url %}
      <img src="{{ restaurante.logo_url }}" style="width:56px;height:56px;border-radius:50%;object-fit:cover;margin:0 auto 1rem">
    {% endif %}
    <div style="font-size:2.5rem;margin-bottom:0.75rem">🔒</div>
    <h1 style="font-size:1.25rem;font-weight:800;color:#1C1C1E;margin-bottom:0.5rem">
      {{ restaurante.nombre }}
    </h1>
    <p style="font-size:0.88rem;color:#6B7280;line-height:1.6">
      Este local no está disponible en este momento.<br>
      Por favor habla con el personal.
    </p>
  </div>
</body>
</html>
