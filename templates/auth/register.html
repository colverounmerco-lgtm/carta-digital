<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar mi local — Carta Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/static/img/logo.svg">
  <link rel="stylesheet" href="/static/css/styles.css">
  <style>
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-top: 0.4rem;
    }
    .cat-label {
      cursor: pointer;
    }
    .cat-label input[type="radio"] {
      display: none;
    }
    .cat-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      padding: 1rem 0.5rem;
      border: 2px solid #E2E8F0;
      border-radius: 14px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #374151;
      background: #fff;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      text-align: center;
      line-height: 1.3;
    }
    .cat-inner .cat-emoji {
      font-size: 1.8rem;
    }
    .cat-label input[type="radio"]:checked + .cat-inner {
      border-color: #F97316;
      background: #FFF7ED;
      color: #C2410C;
    }
    .cat-label:hover .cat-inner {
      border-color: #F97316;
      background: #FFFBF7;
    }
  </style>
</head>
<body>
<div class="auth-wrap" style="padding:2rem 1rem">
  <div class="auth-card" style="max-width:520px">
    <div class="auth-logo">
      <img src="/static/img/logo.svg" style="width:64px;height:64px;border-radius:14px;margin:0 auto 0.75rem;display:block">
      <h1>Registrar mi local</h1>
      <p>Crea tu carta digital en minutos</p>
    </div>

    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="alerta alerta-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/register" enctype="multipart/form-data">

      <div class="campo">
        <label>País *</label>
        <div class="cat-grid" style="grid-template-columns:1fr 1fr">
          <label class="cat-label">
            <input type="radio" name="pais" value="ecuador" required>
            <div class="cat-inner">
              <span class="cat-emoji">🇪🇨</span>
              Ecuador
            </div>
          </label>
          <label class="cat-label">
            <input type="radio" name="pais" value="colombia">
            <div class="cat-inner">
              <span class="cat-emoji">🇨🇴</span>
              Colombia
            </div>
          </label>
        </div>
      </div>

      <div class="campo">
        <label>Tipo de local *</label>
        <div class="cat-grid">
          <label class="cat-label">
            <input type="radio" name="categoria" value="restaurante" required>
            <div class="cat-inner">
              <span class="cat-emoji">🍽️</span>
              Restaurante
            </div>
          </label>
          <label class="cat-label">
            <input type="radio" name="categoria" value="bar">
            <div class="cat-inner">
              <span class="cat-emoji">🍺</span>
              Bar
            </div>
          </label>
          <label class="cat-label">
            <input type="radio" name="categoria" value="cafeteria">
            <div class="cat-inner">
              <span class="cat-emoji">☕</span>
              Cafetería
            </div>
          </label>
        </div>
      </div>

      <div class="campo">
        <label>Nombre del local *</label>
        <input type="text" name="nombre" placeholder="Ej: Bar El Central, Café Rooftop..." required>
      </div>

      <div class="campo">
        <label>Logo del local</label>
        <div class="upload-area" onclick="document.getElementById('logo-input').click()">
          <div style="font-size:2rem;margin-bottom:0.5rem">🖼️</div>
          <p style="font-size:0.85rem;color:#6B7280">Haz clic para subir tu logo (opcional)</p>
          <input type="file" id="logo-input" name="logo" accept="image/*" style="display:none" data-preview="logo-preview">
        </div>
        <img id="logo-preview" class="upload-preview" alt="Preview logo">
      </div>

      <div class="campo">
        <label>Descripción breve *</label>
        <textarea name="descripcion" rows="2" placeholder="Ej: Cócteles artesanales, música en vivo, abierto de 5pm a 2am" required></textarea>
      </div>

      <div class="campo-row">
        <div class="campo" style="margin-bottom:0">
          <label>WhatsApp *</label>
          <input type="tel" name="whatsapp" placeholder="0991234567" required>
        </div>
        <div class="campo" style="margin-bottom:0">
          <label>Ciudad *</label>
          <input type="text" name="ciudad" placeholder="Quito" required>
        </div>
      </div>

      <div class="campo" style="margin-top:1rem">
        <label>Correo electrónico *</label>
        <input type="email" name="email" placeholder="tu@email.com" required>
      </div>

      <div class="campo-row">
        <div class="campo" style="margin-bottom:0">
          <label>Contraseña *</label>
          <input type="password" name="password" placeholder="Mínimo 6 caracteres" required>
        </div>
        <div class="campo" style="margin-bottom:0">
          <label>Repetir contraseña *</label>
          <input type="password" name="password2" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="btn-primario" style="width:100%;padding:0.8rem;font-size:0.95rem;justify-content:center;margin-top:1.5rem">
        Crear mi local
      </button>
    </form>

    <p class="auth-footer">¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></p>
  </div>
</div>
<script src="/static/js/main.js"></script>
<script>
  const PAIS_DATA = {
    ecuador:  { whatsapp: '0991234567', ciudad: 'Quito',  descripcion: 'Ej: Cócteles artesanales, música en vivo, abierto de 5pm a 2am' },
    colombia: { whatsapp: '3001234567', ciudad: 'Bogotá', descripcion: 'Ej: Comida típica, abierto de 12pm a 10pm, servicio a domicilio' },
  };

  document.querySelectorAll('input[name="pais"]').forEach(radio => {
    radio.addEventListener('change', function() {
      const d = PAIS_DATA[this.value];
      if (!d) return;
      document.querySelector('input[name="whatsapp"]').placeholder    = d.whatsapp;
      document.querySelector('input[name="ciudad"]').placeholder      = d.ciudad;
      document.querySelector('textarea[name="descripcion"]').placeholder = d.descripcion;
    });
  });
</script>
</body>
</html>
