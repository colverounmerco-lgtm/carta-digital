<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña — Carta Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/static/img/logo.svg">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="/static/img/logo.svg" style="width:48px;height:48px;border-radius:11px;margin:0 auto 0.5rem;display:block">
      <div class="logo-icon" style="font-size:1.6rem">🔑</div>
      <h1>Recuperar contraseña</h1>
      <p>Te enviamos un código de 6 dígitos a tu correo</p>
    </div>

    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="alerta alerta-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/recuperar">
      <div class="campo">
        <label>Correo electrónico de tu cuenta</label>
        <input type="email" name="email" placeholder="tu@restaurante.com" required autofocus>
      </div>
      <button type="submit" class="btn-primario"
              style="width:100%;padding:0.8rem;font-size:0.95rem;justify-content:center">
        Enviar código
      </button>
    </form>

    <p class="auth-footer"><a href="/login">← Volver al inicio de sesión</a></p>
  </div>
</div>
</body>
</html>
