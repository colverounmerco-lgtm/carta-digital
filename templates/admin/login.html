<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Carta Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0F172A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #1E293B;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .logo-icon {
      width: 52px; height: 52px;
      background: #F97316;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 0.75rem;
    }
    h1 { font-size: 1.3rem; font-weight: 800; color: #F1F5F9; text-align: center; }
    p  { font-size: 0.83rem; color: #64748B; text-align: center; margin-top: 0.3rem; }

    .campo { margin-bottom: 1rem; }
    label  { display: block; font-size: 0.82rem; font-weight: 600; color: #94A3B8; margin-bottom: 0.4rem; }
    input  {
      width: 100%; padding: 0.7rem 0.9rem;
      background: #0F172A; border: 1.5px solid #334155;
      border-radius: 10px; color: #F1F5F9;
      font-size: 0.9rem; font-family: inherit;
      outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: #F97316; }

    .error {
      background: rgba(220,38,38,0.15);
      border: 1px solid rgba(220,38,38,0.3);
      color: #FCA5A5;
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      font-size: 0.83rem;
      margin-bottom: 1rem;
    }

    button {
      width: 100%; padding: 0.85rem;
      background: #F97316; color: #fff;
      border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: background 0.15s;
      margin-top: 0.5rem;
    }
    button:hover { background: #EA580C; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">⚙️</div>
      <h1>Panel de administración</h1>
      <p>Acceso exclusivo para el propietario</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="campo">
        <label>Usuario</label>
        <input type="text" name="usuario" autocomplete="username" autofocus required>
      </div>
      <div class="campo">
        <label>Contraseña</label>
        <input type="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit">Entrar →</button>
    </form>
  </div>
</body>
</html>
